name: Security check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Vercel build config (painel, não landing)
        run: node scripts/verify-vercel-config.mjs
      - name: Security config
        run: node scripts/verify-security-config.mjs
