<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Cobrinha</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .game-wrapper {
      width: 100%;
      max-width: 600px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .score-board {
      font-size: 1rem;
      font-weight: bold;
    }

    .btn {
      border: none;
      background: #10b981;
      color: #052e16;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.05);
    }

    #gameCanvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0b1220;
      border: 1px solid #4b5563;
      border-radius: 8px;
      display: block;
      touch-action: none;
    }

    .hint {
      margin-top: 10px;
      color: #d1d5db;
      font-size: 0.9rem;
    }

    .controls {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 260px;
      margin-left: auto;
      margin-right: auto;
      user-select: none;
    }

    .control {
      padding: 10px 0;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #374151;
      color: #f9fafb;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .control.empty {
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="game-wrapper">
    <div class="header">
      <div class="score-board">Pontos: <span id="score">0</span></div>
      <button id="restartBtn" class="btn" type="button">Reiniciar</button>
    </div>

    <canvas id="gameCanvas" width="480" height="480" aria-label="Tabuleiro do jogo da cobrinha"></canvas>

    <div class="hint">
      Use as setas ou WASD para mover. Coma os morangos e evite bater nas paredes e no próprio corpo.
    </div>

    <div class="controls">
      <button class="control empty" type="button"></button>
      <button class="control" type="button" data-dir="up">↑</button>
      <button class="control empty" type="button"></button>
      <button class="control" type="button" data-dir="left">←</button>
      <button class="control" type="button" data-dir="down">↓</button>
      <button class="control" type="button" data-dir="right">→</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restartBtn");
    const controlButtons = document.querySelectorAll(".control[data-dir]");

    const gridCount = 24;
    const tile = canvas.width / gridCount;
    const gameSpeedMs = 120;

    let snake;
    let direction;
    let nextDirection;
    let food;
    let score;
    let gameOver;
    let loopId;

    function randomGridPosition() {
      return Math.floor(Math.random() * gridCount);
    }

    function spawnFood() {
      let newFood;
      do {
        newFood = { x: randomGridPosition(), y: randomGridPosition() };
      } while (snake.some((part) => part.x === newFood.x && part.y === newFood.y));
      return newFood;
    }

    function resetGame() {
      const centerX = Math.floor(gridCount / 2);
      const centerY = Math.floor(gridCount / 2);
      snake = [
        { x: centerX, y: centerY },
        { x: centerX - 1, y: centerY },
        { x: centerX - 2, y: centerY }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      food = spawnFood();
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;

      if (loopId) {
        clearInterval(loopId);
      }
      loopId = setInterval(gameTick, gameSpeedMs);
      draw();
    }

    function setDirection(newDir) {
      // Impede inversão instantânea (ex.: direita para esquerda).
      const isOpposite = direction.x + newDir.x === 0 && direction.y + newDir.y === 0;
      if (!isOpposite) {
        nextDirection = newDir;
      }
    }

    function gameTick() {
      if (gameOver) return;

      direction = nextDirection;
      const head = { ...snake[0] };
      head.x += direction.x;
      head.y += direction.y;

      const hitWall =
        head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount;
      const hitSelf = snake.some((part) => part.x === head.x && part.y === head.y);

      if (hitWall || hitSelf) {
        gameOver = true;
        clearInterval(loopId);
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        food = spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function drawCircle(x, y, radius, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStrawberry(x, y) {
      const cx = x * tile + tile / 2;
      const cy = y * tile + tile / 2;

      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.moveTo(cx, cy + tile * 0.34);
      ctx.quadraticCurveTo(cx + tile * 0.38, cy + tile * 0.05, cx + tile * 0.2, cy - tile * 0.22);
      ctx.quadraticCurveTo(cx, cy - tile * 0.38, cx - tile * 0.2, cy - tile * 0.22);
      ctx.quadraticCurveTo(cx - tile * 0.38, cy + tile * 0.05, cx, cy + tile * 0.34);
      ctx.fill();

      ctx.fillStyle = "#22c55e";
      ctx.beginPath();
      ctx.moveTo(cx - tile * 0.14, cy - tile * 0.22);
      ctx.lineTo(cx, cy - tile * 0.38);
      ctx.lineTo(cx + tile * 0.14, cy - tile * 0.22);
      ctx.fill();

      const seedOffsets = [
        { x: -0.12, y: -0.04 },
        { x: 0.02, y: -0.1 },
        { x: 0.12, y: -0.02 },
        { x: -0.08, y: 0.12 },
        { x: 0.08, y: 0.12 }
      ];
      seedOffsets.forEach((offset) => {
        drawCircle(cx + tile * offset.x, cy + tile * offset.y, tile * 0.04, "#fde68a");
      });
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        const cx = part.x * tile + tile / 2;
        const cy = part.y * tile + tile / 2;

        if (index === 0) {
          drawCircle(cx, cy, tile * 0.44, "#34d399");
          drawCircle(cx, cy, tile * 0.3, "#6ee7b7");

          const perp = { x: -direction.y, y: direction.x };
          const frontOffset = tile * 0.17;
          const eyeOffset = tile * 0.14;
          const eyeRadius = tile * 0.09;

          const eye1x = cx + direction.x * frontOffset + perp.x * eyeOffset;
          const eye1y = cy + direction.y * frontOffset + perp.y * eyeOffset;
          const eye2x = cx + direction.x * frontOffset - perp.x * eyeOffset;
          const eye2y = cy + direction.y * frontOffset - perp.y * eyeOffset;

          drawCircle(eye1x, eye1y, eyeRadius, "#f8fafc");
          drawCircle(eye2x, eye2y, eyeRadius, "#f8fafc");
          drawCircle(eye1x + direction.x * 2, eye1y + direction.y * 2, tile * 0.04, "#111827");
          drawCircle(eye2x + direction.x * 2, eye2y + direction.y * 2, tile * 0.04, "#111827");

          const tongueBaseX = cx + direction.x * tile * 0.35;
          const tongueBaseY = cy + direction.y * tile * 0.35;
          const tongueTipX = cx + direction.x * tile * 0.55;
          const tongueTipY = cy + direction.y * tile * 0.55;

          ctx.strokeStyle = "#fb7185";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(tongueBaseX, tongueBaseY);
          ctx.lineTo(tongueTipX, tongueTipY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(tongueTipX, tongueTipY);
          ctx.lineTo(tongueTipX + perp.x * 4 - direction.x * 2, tongueTipY + perp.y * 4 - direction.y * 2);
          ctx.moveTo(tongueTipX, tongueTipY);
          ctx.lineTo(tongueTipX - perp.x * 4 - direction.x * 2, tongueTipY - perp.y * 4 - direction.y * 2);
          ctx.stroke();
        } else {
          const sizeFactor = Math.max(0.28, 0.42 - index * 0.008);
          drawCircle(cx, cy, tile * sizeFactor, index % 2 ? "#16a34a" : "#15803d");
          if (index % 3 === 0) {
            drawCircle(cx, cy, tile * (sizeFactor * 0.42), "#22c55e");
          }
        }
      });
    }

    function draw() {
      ctx.fillStyle = "#0b1220";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawStrawberry(food.x, food.y);
      drawSnake();

      if (gameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "center";
        ctx.font = "bold 34px Arial";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "20px Arial";
        ctx.fillText(`Pontos: ${score}`, canvas.width / 2, canvas.height / 2 + 24);
      }
    }

    document.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (key === "arrowup" || key === "w") setDirection({ x: 0, y: -1 });
      else if (key === "arrowdown" || key === "s") setDirection({ x: 0, y: 1 });
      else if (key === "arrowleft" || key === "a") setDirection({ x: -1, y: 0 });
      else if (key === "arrowright" || key === "d") setDirection({ x: 1, y: 0 });
    });

    controlButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const dir = btn.dataset.dir;
        if (dir === "up") setDirection({ x: 0, y: -1 });
        if (dir === "down") setDirection({ x: 0, y: 1 });
        if (dir === "left") setDirection({ x: -1, y: 0 });
        if (dir === "right") setDirection({ x: 1, y: 0 });
      });
    });

    restartBtn.addEventListener("click", resetGame);

    resetGame();
  </script>
</body>
</html>
